<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyBridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f23; color: #ffffff; padding: 20px; }
    h1 { color: #7c3aed; }
    .card { background: #1a1b2e; border-radius: 12px; padding: 20px; margin: 20px 0; border: 1px solid #2d3154; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; margin: 4px; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-secondary { background: #252848; color: #a0a4c8; }
    textarea { width: 100%; min-height: 100px; background: #252848; color: #fff; border: 1px solid #2d3154; border-radius: 8px; padding: 12px; margin: 10px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div style="max-width: 1200px; margin: 0 auto;">
    <h1>LegacyBridge Social Media Optimizer</h1>
    <p>Working! If you see this, GitHub Pages is serving the file.</p>
  </div>
</body>
</html>
