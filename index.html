<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyBridge Social Media Optimizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f23; color: #ffffff; padding: 20px; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #7c3aed; margin-bottom: 20px; }
    .card { background: #1a1b2e; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #2d3154; }
    .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; margin: 4px; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-secondary { background: #252848; color: #a0a4c8; }
    .btn-success { background: #10b981; color: #fff; }
    textarea, .output { width: 100%; min-height: 150px; background: #252848; color: #fff; border: 1px solid #2d3154; border-radius: 8px; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.5; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    .flex-gap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LegacyBridge Social Media Optimizer</h1>
    <div class="card">
      <h2>Generational Translator</h2>
      <p style="color: #6c7090; font-size: 13px; margin: 4px 0 16px 0;">Adapt content for different audiences</p>
      <div class="flex-gap">
        <button class="btn btn-secondary gen-btn" data-gen="genz" onclick="selectGen(this)">👾 Gen Z</button>
        <button class="btn btn-secondary gen-btn" data-gen="millennial" onclick="selectGen(this)">🥑 Millennial</button>
        <button class="btn btn-secondary gen-btn" data-gen="genx" onclick="selectGen(this)">🎸 Gen X</button>
        <button class="btn btn-secondary gen-btn" data-gen="boomer" onclick="selectGen(this)">👴 Boomer</button>
        <button class="btn btn-secondary gen-btn" data-gen="corporate" onclick="selectGen(this)">💼 Corporate</button>
        <button class="btn btn-secondary gen-btn" data-gen="developer" onclick="selectGen(this)">💻 Developer</button>
      </div>
      <div class="grid">
        <div><textarea id="originalText" placeholder="Enter text..." oninput="updateFormatted()"></textarea></div>
        <div><div id="translatedOutput" class="output">Translation appears here...</div></div>
      </div>
      <div class="flex-gap">
        <button id="translateBtn" class="btn btn-primary" onclick="translateText()">Translate</button>
        <button id="applyBtn" class="btn btn-success" onclick="applyTranslation()" disabled>Apply</button>
      </div>
    </div>
    <div class="card">
      <h2>Platform Formatter</h2>
      <div class="flex-gap">
        <button class="btn btn-secondary plat-btn" data-plat="twitter" onclick="selectPlatform(this)">🐦 Twitter/X</button>
        <button class="btn btn-secondary plat-btn" data-plat="facebook" onclick="selectPlatform(this)">📘 Facebook</button>
        <button class="btn btn-secondary plat-btn" data-plat="linkedin" onclick="selectPlatform(this)">💼 LinkedIn</button>
        <button class="btn btn-secondary plat-btn" data-plat="instagram" onclick="selectPlatform(this)">📷 Instagram</button>
        <button class="btn btn-secondary plat-btn" data-plat="tiktok" onclick="selectPlatform(this)">🎵 TikTok</button>
        <button class="btn btn-secondary plat-btn" data-plat="reddit" onclick="selectPlatform(this)">🔴 Reddit</button>
        <button class="btn btn-secondary plat-btn" data-plat="threads" onclick="selectPlatform(this)">🧵 Threads</button>
        <button class="btn btn-secondary plat-btn" data-plat="discord" onclick="selectPlatform(this)">💬 Discord</button>
        <button class="btn btn-secondary plat-btn" data-plat="slack" onclick="selectPlatform(this)">📋 Slack</button>
      </div>
      <div>
        <div id="formattedOutput" class="output" style="margin-top: 10px;">Formatted text appears here...</div>
        <button id="copyBtn" class="btn btn-primary" onclick="copyFormatted()" style="margin-top: 12px;" disabled>Copy to Clipboard</button>
      </div>
    </div>
  </div>
  <script>
    let selectedGen='genz',selectedPlatform='twitter',translatedText='';
    const G={
      genz:{n:'Gen Z',i:'👾',t:t=>{const s=['fr','no cap','slay','rizz'];let r=t.replace(/very/g,'hella').replace(/cool/g,'fire').replace(/good/g,'solid').replace(/bad/g,'mid').replace(/friend/g,'bestie').replace(/\bto\b/g,'2').replace(/\bfor\b/g,'4').replace(/\byou\b/g,'u');if(Math.random()>.5)r+=' '+['💀','🔥'][Math.floor(Math.random()*2)];return r}},
      millennial:{n:'Millennial',i:'🥑',t:t=>{const p=['Adulting','On fleek'];let r=t.replace(/work/g,'hustle').replace(/tired/g,'exhausted').replace(/money/g,'guac');if(Math.random()>.8)r=p[Math.floor(Math.random()*p.length)]+': '+r;return r}},
      genx:{n:'Gen X',i:'🎸',t:t=>{const p=['Whatever'];let r=t.replace(/amazing/g,'okay').replace(/wonderful/g,'fine').replace(/love/g,'tolerate');if(Math.random()>.6)r=p[0]+'. '+r;return r}},
      boomer:{n:'Boomer',i:'👴',t:t=>{let r=t.replace(/u\b/g,'you').replace(/\bur\b/g,'your').replace(/\b2\b/g,'to').replace(/\b4\b/g,'for').replace(/\br\b/g,'are').replace(/btw/g,'by the way').replace(/thx/g,'thank you').replace(/pls/g,'please').replace(/omg/g,'Oh my goodness').replace(/lol/g,'That is amusing');if(!r.endsWith('.')&&!r.endsWith('!')&&!r.endsWith('?'))r+='.';return r.charAt(0).toUpperCase()+r.slice(1)}},
      corporate:{n:'Corporate',i:'💼',t:t=>{const b=['synergy'];let r=t.replace(/good/g,'optimal').replace(/bad/g,'suboptimal').replace(/do/g,'action').replace(/use/g,'utilize');if(Math.random()>.5)r="Let's "+b[0]+' to '+r;return r}},
      developer:{n:'Developer',i:'💻',t:t=>{const x=['404'];let r=t.replace(/problem/g,'bug').replace(/fix/g,'patch').replace(/works/g,'compiles').replace(/easy/g,'trivial');if(Math.random()>.6)r=r+' // TODO: '+x[0];return r}}
    };
    const P={twitter:{n:'Twitter/X',c:280},facebook:{n:'Facebook',c:63206},linkedin:{n:'LinkedIn',c:3000},instagram:{n:'Instagram',c:2200},tiktok:{n:'TikTok',c:150},reddit:{n:'Reddit',c:40000},threads:{n:'Threads',c:500},discord:{n:'Discord',c:2000},slack:{n:'Slack',c:4000}};
    function F(t,p){if(!t)return '';const f=P[p];if(!f)return t;let r=t;switch(p){case 'twitter':r=r.replace(/\n/g,' ').replace(/\s+/g,' ').trim();break;case 'tiktok':r=r.trim();if(r.length>150)r=r.substring(0,147)+'...';if(!r.includes('#')&&r.length<150)r+=' #viral';break;case 'instagram':r=r.replace(/\n\n+/g,'\n\n');if(!r.includes('#')&&r.length<2100)r+='\n\n#photo';break;case 'linkedin':case 'reddit':r=r.replace(/\n/g,'\n\n');break;default:r=r.replace(/\n\n+/g,'\n\n')}if(f.c&&r.length>f.c)r=r.substring(0,f.c-3)+'...';return r;}
    async function C(t){try{await navigator.clipboard.writeText(t);return true}catch(e){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();const r=document.execCommand('copy');document.body.removeChild(a);return r;}}
    function S(b){selectedGen=b.dataset.gen;document.querySelectorAll('.gen-btn').forEach(x=>x.className='btn btn-secondary gen-btn');b.className='btn btn-selected gen-btn';}
    function PL(b){selectedPlatform=b.dataset.plat;document.querySelectorAll('.plat-btn').forEach(x=>x.className='btn btn-secondary plat-btn');b.className='btn btn-selected plat-btn';U();}
    function T(){const t=document.getElementById('originalText').value;if(!t)return;document.getElementById('translateBtn').disabled=true;setTimeout(()=>{const s=G[selectedGen];translatedText=s.t(t);document.getElementById('translatedOutput').textContent=translatedText;document.getElementById('applyBtn').disabled=false;document.getElementById('translateBtn').disabled=false;},500);}
    function A(){if(translatedText){document.getElementById('originalText').value=translatedText;U();}}
    function U(){const t=document.getElementById('originalText').value;const f=F(t,selectedPlatform);document.getElementById('formattedOutput').textContent=f||'Formatted text appears here...';document.getElementById('copyBtn').disabled=!f;}
    async function CF(){const f=document.getElementById('formattedOutput').textContent;if(f&&f!=='Formatted text appears here...'){const s=await C(f);if(s)alert('Copied!');}}
    document.getElementById('originalText').addEventListener('input',U);
    document.querySelector('.gen-btn[data-gen="'+selectedGen+'"]').className='btn btn-selected gen-btn';
    document.querySelector('.plat-btn[data-plat="'+selectedPlatform+'"]').className='btn btn-selected plat-btn';
  </script>
</body>
</html>
